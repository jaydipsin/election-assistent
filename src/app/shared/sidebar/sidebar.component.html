<!-- Overlay -->
@if (isOpen()) {
  <div class="sidebar-overlay" (click)="close()" aria-hidden="true"></div>
}

<!-- Sidebar -->
<aside
  class="sidebar"
  [class.sidebar--open]="isOpen()"
  role="navigation"
  aria-label="Mobile navigation"
>
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#000080"/>
        <path d="M8 10h16v2H8zm0 5h16v2H8zm0 5h16v2H8z" fill="#FF9933"/>
        <circle cx="16" cy="16" r="3" fill="#138808"/>
      </svg>
      <span>मतदान</span>
    </div>
    <button class="sidebar__close" (click)="close()" aria-label="Close menu" id="sidebar-close-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="sidebar__nav-link--active"
        [routerLinkActiveOptions]="{exact: item.exact}"
        class="sidebar__nav-link"
        (click)="onNavClick()"
        [id]="'sidebar-nav-' + item.icon"
      >
        <span class="sidebar__nav-icon">
          @switch (item.icon) {
            @case ('home') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            }
            @case ('book') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
            }
            @case ('layers') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                <polyline points="2 17 12 22 22 17"/>
                <polyline points="2 12 12 17 22 12"/>
              </svg>
            }
            @case ('message') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            }
          }
        </span>
        <span class="sidebar__nav-label">{{ lang.t(item.labelKey) }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__lang-info">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span>{{ lang.language() === 'en' ? 'English' : 'हिंदी' }}</span>
    </div>
  </div>
</aside>
