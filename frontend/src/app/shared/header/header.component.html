<header class="header" role="banner">
  <div class="header__inner">
    <!-- Mobile Menu Toggle -->
    <button
      class="header__menu-btn"
      (click)="onToggleMenu()"
      aria-label="Toggle navigation menu"
      id="menu-toggle-btn"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Logo -->
    <a routerLink="/" class="header__logo" id="logo-link">
      <div class="header__logo-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#000080"/>
          <path d="M8 10h16v2H8zm0 5h16v2H8zm0 5h16v2H8z" fill="#FF9933"/>
          <circle cx="16" cy="16" r="3" fill="#138808"/>
        </svg>
      </div>
      <div class="header__logo-text">
        <span class="header__logo-name">मतदान</span>
        <span class="header__logo-tagline">Matdaan</span>
      </div>
    </a>

    <!-- Desktop Navigation -->
    <nav class="header__nav" role="navigation" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="header__nav-link--active" [routerLinkActiveOptions]="{exact: true}" class="header__nav-link" id="nav-home">
        {{ lang.t('nav.home') }}
      </a>
      <a routerLink="/election-types" routerLinkActive="header__nav-link--active" class="header__nav-link" id="nav-election-types">
        {{ lang.t('nav.electionTypes') }}
      </a>
    </nav>

    <!-- Right Actions -->
    <div class="header__actions">
      <!-- Language Toggle -->
      <button
        class="header__lang-toggle"
        (click)="onToggleLanguage()"
        [attr.aria-label]="'Switch to ' + lang.t('lang.toggle')"
        id="lang-toggle-btn"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="header__lang-label">{{ lang.t('lang.toggle') }}</span>
      </button>
    </div>
  </div>
</header>
