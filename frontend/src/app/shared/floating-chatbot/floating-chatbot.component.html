<div class="chatbot-wrapper">
  
  <!-- Toggle Button -->
  <button class="chat-toggle" (click)="toggleChat()" *ngIf="!isOpen()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" *ngIf="isOpen()" @toggleChat>
    
    <div class="chat-header">
      <div class="chat-header__title">
        <div class="chat-header__status"></div>
        <span>Election Assistant</span>
      </div>
      <button class="chat-header__close" (click)="toggleChat()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="chat-messages" #scrollContainer>
      @for (msg of messages(); track $index) {
        <div class="message" [class.message--user]="msg.isUser" [class.message--bot]="!msg.isUser">
          @if (msg.isUser) {
            {{ msg.text }}
          } @else {
            <div class="markdown-content" [innerHTML]="(msg.formattedText || msg.text) | safeHtml"></div>
          }
        </div>
      }

      @if (isLoading()) {
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      }
    </div>

    <form class="chat-input-area" (submit)="sendMessage(); $event.preventDefault()">
      <input 
        type="text" 
        [placeholder]="lang.t('chatbot.placeholder')"
        [ngModel]="userInput()"
        (ngModelChange)="userInput.set($event)"
        [ngModelOptions]="{standalone: true}"
        (keyup.enter)="sendMessage()">
      <button type="submit" [disabled]="!userInput().trim() || isLoading()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>

  </div>
</div>
